name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tok-sudo
        run: |
          sudo make install

      - name: Run tests
        run: |
          sudo ./test.sh